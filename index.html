<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Security hardening: CSP + referrer policy.
         script-src hashes: first covers the inline theme script below (recompute if it
         changes), second covers the react-refresh preamble @vitejs/plugin-react injects
         in dev. 'unsafe-inline' is style-src only (framer-motion/recharts/sonner set
         inline styles). connect-src allows https: so VITE_API_URL stays pluggable and
         ws: for the dev-server HMR socket. frame-ancestors/X-Frame-Options cannot be
         set via <meta> — configure those at the hosting server. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'sha256-pEUDG3Gn7yfUKO864Iv/hu7ElUgRnEh9xCcA7L1rGN4=' 'sha256-Z2/iFzh9VMlVkEOar1f/oSHWwQk3ve1qk/C2WdsC4Xk='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https: ws:; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Kre8trix — Creator Financial OS</title>
    <!-- C6: PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="theme-color" content="#06060E" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kre8trix" />
    <!-- /C6 -->

    <!-- C7: apply the persisted theme before first paint to avoid a flash -->
    <script>
      (function () {
        var theme = 'dark';
        try {
          var stored = localStorage.getItem('kre8trix.theme');
          if (stored === 'light' || stored === 'dark') {
            theme = stored;
          } else if (stored === 'system' && window.matchMedia('(prefers-color-scheme: light)').matches) {
            theme = 'light';
          }
        } catch (e) { /* default to dark */ }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
